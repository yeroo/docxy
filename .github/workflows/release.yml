name: release

# Tag a version to cut a release:  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write # create release + upload assets
      id-token: write # keyless provenance + cosign signing
      attestations: write # build-provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
            ext: ""
          - os: windows-latest
            suffix: windows-x86_64.exe
            ext: ".exe"
          - os: macos-latest
            suffix: macos-aarch64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux clipboard deps (arboard)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build
        run: cargo build --release -p docxy -p xlsxy

      - name: Stage binaries + checksums
        shell: bash
        run: |
          mkdir -p dist
          for bin in docxy xlsxy; do
            cp "target/release/${bin}${{ matrix.ext }}" "dist/${bin}-${{ matrix.suffix }}"
          done
          cd dist
          for asset in *; do
            if command -v sha256sum >/dev/null; then
              sha256sum "$asset" > "$asset.sha256"
            else
              shasum -a 256 "$asset" > "$asset.sha256"
            fi
            cat "$asset.sha256"
          done

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/docxy-${{ matrix.suffix }}
            dist/xlsxy-${{ matrix.suffix }}

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts (keyless)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          for bin in docxy xlsxy; do
            cosign sign-blob --yes \
              --output-signature "dist/${bin}-${{ matrix.suffix }}.sig" \
              --output-certificate "dist/${bin}-${{ matrix.suffix }}.pem" \
              "dist/${bin}-${{ matrix.suffix }}"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  vsix:
    name: package VS Code extension
    permissions:
      contents: write # attach the .vsix to the release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build the .vsix
        working-directory: offxy-vscode
        # `vsce package` runs the vscode:prepublish script, which builds both
        # the docxwasm and gridwasm wasm crates (cargo) and bundles the
        # extension before packaging.
        run: |
          npm ci
          npx --yes @vscode/vsce@latest package --no-dependencies

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: offxy-vsix
          path: offxy-vscode/*.vsix

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: offxy-vscode/*.vsix

  jetbrains:
    name: package JetBrains plugin
    permissions:
      contents: write # attach the plugin zip to the release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build the plugin zip
        working-directory: offxy-jetbrains
        run: ./gradlew buildPlugin --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: offxy-jetbrains-zip
          path: offxy-jetbrains/build/distributions/*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: offxy-jetbrains/build/distributions/*.zip

  publish:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !github.event.repository.fork
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux clipboard deps (arboard)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Publish crates (dependency order, skip already-published)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Cutting a binary release shouldn't fail just because the crates.io
          # token isn't configured — skip the publish cleanly when it's absent.
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publish."
            exit 0
          fi
          # opccore/gridcore/xlsxy version independently of the docxy release
          # train, so a tag often re-carries versions that are already on
          # crates.io. Publishing those again would hard-fail the job, so each
          # crate is skipped when its exact version is already indexed.
          publish() {
            crate="$1"
            ver=$(cargo pkgid -p "$crate" | sed 's/.*[@#]//')
            if curl -fsSL -A "docxy-release-workflow" \
                 "https://crates.io/api/v1/crates/${crate}/${ver}" >/dev/null 2>&1; then
              echo "${crate} ${ver} is already on crates.io — skipping."
              return 0
            fi
            cargo publish -p "$crate"
            # Give crates.io a moment to index before dependents publish.
            sleep 30
          }
          publish opccore
          publish docxcore
          publish gridcore
          publish docxy
          publish xlsxy
