name: Release

# Tag a version to cut a release:  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc, ext: .exe }
          - { os: macos-latest, target: aarch64-apple-darwin, ext: "" }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, ext: "" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux clipboard deps (arboard)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p docxy
      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/docxy${{ matrix.ext }}"
          name="docxy-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$name"
          cp "$bin" "$name/"
          cp README.md LICENSE "$name/"
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$name.zip" "$name"
          else
            tar czf "$name.tar.gz" "$name"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            docxy-*.zip
            docxy-*.tar.gz

  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    # Requires a CARGO_REGISTRY_TOKEN repo secret (crates.io API token).
    if: ${{ !github.event.repository.fork }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux clipboard deps (arboard)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Publish docxcore, then docxy
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p docxcore
          # Give crates.io a moment to index docxcore before docxy depends on it.
          sleep 30
          cargo publish -p docxy
