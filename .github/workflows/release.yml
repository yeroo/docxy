name: release

# Tag a version to cut a release:  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write # create release + upload assets
      id-token: write # keyless provenance + cosign signing
      attestations: write # build-provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: docxy
            asset: docxy-linux-x86_64
          - os: windows-latest
            bin: docxy.exe
            asset: docxy-windows-x86_64.exe
          - os: macos-latest
            bin: docxy
            asset: docxy-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux clipboard deps (arboard)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build
        run: cargo build --release -p docxy

      - name: Stage binary + checksum
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"
          cd dist
          if command -v sha256sum >/dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
          cat "${{ matrix.asset }}.sha256"

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/${{ matrix.asset }}

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@v3

      - name: Sign artifact (keyless)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob --yes \
            --output-signature "dist/${{ matrix.asset }}.sig" \
            --output-certificate "dist/${{ matrix.asset }}.pem" \
            "dist/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
            dist/${{ matrix.asset }}.sig
            dist/${{ matrix.asset }}.pem

  publish:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !github.event.repository.fork
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux clipboard deps (arboard)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Publish docxcore, then docxy
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p docxcore
          # Give crates.io a moment to index docxcore before docxy depends on it.
          sleep 30
          cargo publish -p docxy
